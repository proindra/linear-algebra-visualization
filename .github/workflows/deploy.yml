name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          echo "Checking required files..."
          test -f math.html && echo "✅ math.html found" || (echo "❌ math.html missing" && exit 1)
          test -f three.min.js && echo "✅ three.min.js found" || (echo "❌ three.min.js missing" && exit 1)
          test -f OrbitControls.js && echo "✅ OrbitControls.js found" || (echo "❌ OrbitControls.js missing" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
